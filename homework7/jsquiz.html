<script type="text/javascript">
// YOUR CODE HERE
  fifth = document.querySelectorAll('li')[4];
  red.oninput = function() {
    fifth.style.color = 'red';
    red.checked = true;
    blue.checked = false;
  }
  blue.oninput = function() {

    red.checked = false;
    blue.checked = true;
  }
