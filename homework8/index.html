<!DOCTYPE html>
<html lang="en" dir="ltr">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
		<title>Drawing Area</title>
		<!-- You can add your style here rather than in an external style sheet. -->
		<style>
			canvas {
			    border:5px solid #d3d3d3;
			    background-color: #f1f1f1;
			    display: block;
			}
		</style>
	</head>
<body>
    <!-- DO NOT MODIFY THIS HTML -->
    <canvas id = "myCanvas" width = "350" height = "500"  ></canvas>
    <input type = "color" id = "picker"/>
		<script type="text/javascript">

			var c = document.querySelector("#myCanvas");
			var picker = document.querySelector("#picker")

			var cWidth = .80 * window.innerWidth;
			var cHeight = .80 * window.innerHeight;

			c.width = cWidth;
			c.height = cHeight;

			// c.width = "80vw";
			// c.height = "80vh";
			var ctx = c.getContext("2d");

			var flag = 0;

			function draw(x,y) {
				ctx.arc(x-12,y-12,10,0 * Math.PI,2 * Math.PI);
				// Read about this solution from Bhawna Agarwal on Slack
				if (flag == 0) {
					ctx.fill();
				}
			}


			myCanvas.addEventListener(
				'mousemove', function(e) {
					console.log(e);
					ctx.beginPath();
					draw(e.clientX,e.clientY);
					var x = e.clientX;
					var y = e.clientY;
					draw(x,y);
				}
			)

			document.addEventListener(
				'keydown', function(e) {
					console.log(e);
								 if (e.key == "r") {
						ctx.fillStyle = "red";
					} else if (e.key == "b") {
						ctx.fillStyle = "blue";
					} else if (e.key == "g") {
						ctx.fillStyle = "green";
					} else if (e.key == "y") {
						ctx.fillStyle = "yellow";
					} else if (e.key == " ") {
						ctx.clearRect(0,0,cWidth,cHeight)
					} else if (e.key == "ArrowUp") {
						flag = 1;
					} else if (e.key == "ArrowDown") {
						flag = 0;
					}

				}
			)

			picker.addEventListener(
				'input', function() {
					ctx.fillStyle = picker.value;					
				}
			)


		</script>
</body>
</html>
